ackground:#f0f4ff}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.nt{font-size:10px;color:#999;flex-shrink:0}.ga{flex:1;position:relative;overflow:hidden}#cy{width:100%;height:100%;position:relative}.leg{position:absolute;bottom:14px;right:14px;background:rgba(255,255,255,.92);border-radius:8px;padding:8px 12px;font-size:11px;box-shadow:0 1px 6px rgba(0,0,0,.1)}.leg div{display:flex;align-items:center;gap:5px;margin:2px 0}.ld{width:8px;height:8px;border-radius:50%;display:inline-block}.dp{position:absolute;top:0;right:0;width:340px;height:100%;background:#fff;box-shadow:-2px 0 12px rgba(0,0,0,.08);padding:16px;overflow-y:auto;display:none;z-index:10}.dp.sh{display:block}.dx{float:right;background:none;border:none;font-size:16px;cursor:pointer;color:#999}.dx:hover{color:#333}.dt{font-size:14px;font-weight:600;margin-bottom:8px;padding-right:24px}.dm{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}.src-badge{padding:2px 8px;border-radius:4px;font-size:11px;background:#f0f4ff;color:#555}.dty{font-size:11px;padding:2px 8px;border-radius:8px;color:#fff}.dc{font-size:12px;color:#333;line-height:1.7;margin-bottom:10px;white-space:pre-wrap;word-break:break-all}.dtg{display:flex;flex-wrap:wrap;gap:4px}.dtg span{background:#f0f4ff;padding:2px 8px;border-radius:8px;font-size:10px;color:#555}.tp{position:absolute;background:rgba(0,0,0,.78);color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;pointer-events:none;display:none;z-index:20;white-space:nowrap;max-width:400px;overflow:hidden;text-overflow:ellipsis}</style>

<script>
var NODES = [{"id": "case-001", "label": "李某某与王某某民间借贷纠纷案", "type": "case", "color": "#e67e22", "ref": "(2023)京01民终1234号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】李某某向王某某借款10万元，出具借条但未约定还款期限和利息。【裁判要点】1. 未约定还款期限的，出借人可催告借款人在合理期限内返还；2. 未约定利息的，视为没有利息，但逾期后可主张资金占用费。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-002", "label": "张某某诉某房地产公司商品房买卖合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)沪01民终567号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】张某某与某房地产公司签订商品房买卖合同，约定2023年6月30日前交房。开发商逾期至2024年3月才交房。【裁判要点】1. 开发商逾期交房构成违约，应按合同约定支付违约金；2. 约定的违约金过低时，买受人可请求法院按实际损失调整。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-003", "label": "赵某诉某公司劳动争议案", "type": "case", "color": "#e67e22", "ref": "(2024)粤01民终2345号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】赵某在某公司工作3年，公司未依法为其缴纳社会保险。赵某提出解除劳动合同并要求经济补偿。【裁判要点】1. 用人单位未依法缴纳社保，劳动者有权解除合同；2. 用人单位应当支付经济补偿金，按工作年限每满一年支付一个月工资。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-004", "label": "刘某诉陈某离婚纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)苏01民终3456号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】刘某与陈某结婚8年，因感情不和分居已满2年。双方就子女抚养和财产分割无法达成一致。【裁判要点】1. 因感情不和分居满二年，经调解无效，应准予离婚；2. 婚生子由母亲抚养，父亲每月支付抚养费；3. 婚后购买的房屋按共同财产分割。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-005", "label": "王某诉李某机动车交通事故责任纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)浙01民终4567号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】李某驾驶机动车追尾王某车辆，交警认定李某全责。王某车辆维修费5万元，另产生租车代步费用3000元。【裁判要点】1. 先由交强险赔付，不足部分由商业险赔付；2. 合理的替代性交通工具费用属于财产损失范围，应予支持。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-006", "label": "陈某诉某装修公司合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)川01民终5678号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】陈某与某装修公司签订装修合同，约定总价15万元。装修过程中公司多次增项加价，最终结算价达22万元。陈某拒绝支付超出部分。【裁判要点】1. 未经业主书面同意的增项，装修公司无权要求支付；2. 合同约定固定总价的，超出部分需双方协商一致。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-007", "label": "周某继承纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)鄂01民终6789号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】被继承人去世，留有房产一套和存款50万元。三子女对遗产分配产生争议，长子和次女主张平均分配，幼子主张自己应多分。【裁判要点】1. 同一顺序继承人一般应当均等分配；2. 对被继承人尽了主要扶养义务的可以多分；3. 有扶养能力和条件但不尽扶养义务的应当不分或少分。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-008", "label": "某某银行诉黄某金融借款合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)京02民初7890号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】黄某向银行贷款80万元购买房屋，以该房屋设定抵押。黄某连续6个月未还月供，银行起诉要求解除合同、收回全部贷款本息并实现抵押权。【裁判要点】1. 借款人连续逾期构成违约，银行有权宣布贷款提前到期；2. 银行对抵押房屋享有优先受偿权。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-009", "label": "杨某诉某物流公司运输合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)闽01民终8901号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】杨某委托某物流公司运输一批精密仪器，运输途中发生交通事故导致仪器损坏。物流公司主张适用运单上的免责条款。【裁判要点】1. 物流公司作为承运人应当对运输过程中货物的毁损承担赔偿责任；2. 格式条款中免除承运人基本责任的条款无效。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-010", "label": "吴某诉某科技公司网络服务合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)粤03民终9012号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】吴某在某电商平台购买电子产品，收货后发现与描述严重不符。平台以‘已拆封不影响二次销售’为由拒绝退货。【裁判要点】1. 网络购物消费者享有七日无理由退货权利；2. ‘已拆封’不构成拒绝退货的合理理由，除非商品性质特殊。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-011", "label": "郑某诉某物业公司物业服务合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)渝01民终0123号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】某小区业主郑某因房屋漏水问题拒交物业费，物业公司起诉要求支付欠缴的物业费及滞纳金。【裁判要点】1. 房屋质量问题属于开发商责任，不构成拒交物业费的正当理由；2. 物业服务存在瑕疵的，业主可主张减免部分费用。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-012", "label": "孙某诉某教育培训公司合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)津01民终1234号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】孙某为子女报名某培训机构的课程，一次性支付3年费用6万元。培训机构经营不善倒闭，剩余1.5年课程未上。【裁判要点】1. 培训机构无法继续提供服务的，应当退还未上课时的费用；2. 格式条款中‘概不退款’的约定无效。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-013", "label": "某某公司与某某公司建设工程施工合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)鲁01民终2345号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】总包公司将工程分包给某建筑公司，工程竣工验收合格后，总包公司以分包合同无效为由拒付工程款。【裁判要点】1. 建设工程施工合同无效，但工程经竣工验收合格的，承包人可以请求参照合同约定支付工程价款；2. 违法分包的发包人在欠付工程款范围内承担连带责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-014", "label": "马某诉某保险公司保险合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)辽01民终3456号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】马某为其车辆投保商业险，发生事故后保险公司以‘驾驶人未在事故现场’为由拒赔。马某主张自己因受伤被送医。【裁判要点】1. 保险公司以免责条款拒赔的，应当证明已就该条款向投保人履行了提示和明确说明义务；2. 未履行说明义务的免责条款对投保人不产生效力。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-015", "label": "高某诉某餐饮公司生命权健康权纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)湘01民终4567号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】高某在某餐厅就餐时，因地面湿滑摔倒致骨折。餐厅未设置警示标识。【裁判要点】1. 宾馆、商场、餐馆等经营场所未尽到安全保障义务，造成他人损害的，应当承担侵权责任；2. 被侵权人对损害发生也有过错的，可以减轻侵权人的责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-016", "label": "某某公司与某某公司股权转让纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)京03民终5678号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】A公司与B公司签订股权转让协议，约定分期付款。A公司支付首期款后，发现B公司隐瞒了目标公司的重大债务。【裁判要点】1. 股权转让方应当如实披露目标公司的重大信息；2. 隐瞒重大债务构成欺诈，受让方有权请求撤销股权转让协议。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-017", "label": "朱某诉某医院医疗损害责任纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)豫01民终6789号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】朱某在某医院进行手术，术后出现并发症导致残疾。朱某主张医院术前未充分告知风险。【裁判要点】1. 医疗机构负有告知义务，未履行告知义务取得患者书面同意的，应当承担相应责任；2. 医疗损害鉴定是认定过错和因果关系的重要依据。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-018", "label": "某某公司诉某某公司买卖合同货款纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)冀01民终7890号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】供货公司按约向采购公司交付了货物，采购公司以货物存在质量问题为由拒绝支付剩余货款50万元，但未提供质量不合格的证据。【裁判要点】1. 买受人主张货物质量不合格的，应当提供证据证明；2. 不能证明质量问题的，应当按照约定支付货款。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-019", "label": "某某公司与某某公司租赁合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)陕01民终8901号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】某公司租赁商铺经营，因疫情原因停业3个月，要求减免该期间的租金。出租方不同意。【裁判要点】1. 因疫情等不可抗力导致经营困难的，承租人可以请求减免租金；2. 减免幅度应根据疫情对经营的实际影响程度确定。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "case-020", "label": "何某诉某公司劳动合同纠纷案", "type": "case", "color": "#e67e22", "ref": "(2024)皖01民终9012号", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "【基本案情】何某在某公司工作5年，公司单方面解除劳动合同，理由是‘严重违反规章制度’。但公司未能提供何某签收规章制度的记录。【裁判要点】1. 用人单位以严重违反规章制度为由解除合同的，应当证明规章制度已向劳动者公示或告知；2. 无法证明告知的，属于违法解除，应支付赔偿金（双倍经济补偿）。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-667", "label": "民法典第667条：借款合同定义", "type": "law", "color": "#3498db", "ref": "民法典第667条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款合同是借款人向贷款人借款，到期返还借款并支付利息的合同。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-668", "label": "民法典第668条：借款合同形式", "type": "law", "color": "#3498db", "ref": "民法典第668条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款合同应当采用书面形式，但是自然人之间借款另有约定的除外。借款合同的内容包括借款种类、币种、用途、数额、利率、期限和还款方式等条款。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-669", "label": "民法典第669条：借款合同提供真实情况义务", "type": "law", "color": "#3498db", "ref": "民法典第669条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "订立借款合同，借款人应当按照贷款人的要求提供与借款有关的业务活动和财务状况的真实情况。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-670", "label": "民法典第670条：借款利息不得预先扣除", "type": "law", "color": "#3498db", "ref": "民法典第670条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款的利息不得预先在本金中扣除。利息预先在本金中扣除的，应当按照实际借款数额返还借款并计算利息。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-671", "label": "民法典第671条：贷款人未按约提供借款的责任", "type": "law", "color": "#3498db", "ref": "民法典第671条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "贷款人未按照约定的日期、数额提供借款，造成借款人损失的，应当赔偿损失。借款人未按照约定的日期、数额收取借款的，应当按照约定的日期、数额支付利息。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-672", "label": "民法典第672条：贷款人检查权", "type": "law", "color": "#3498db", "ref": "民法典第672条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "贷款人按照约定可以检查、监督借款的使用情况。借款人应当按照约定向贷款人定期提供有关财务会计报表或者其他资料。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-673", "label": "民法典第673条：借款人未按约定用途使用借款", "type": "law", "color": "#3498db", "ref": "民法典第673条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人未按照约定的借款用途使用借款的，贷款人可以停止发放借款、提前收回借款或者解除合同。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-674", "label": "民法典第674条：借款人未按约定支付利息", "type": "law", "color": "#3498db", "ref": "民法典第674条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人应当按照约定的期限支付利息。对支付利息的期限没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定，借款期间不满一年的，应当在返还借款时一并支付；借款期间一年以上的，应当在每届满一年时支付，剩余期间不满一年的，应当在返还借款时一并支付。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-675", "label": "民法典第675条：借款返还期限", "type": "law", "color": "#3498db", "ref": "民法典第675条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人应当按照约定的期限返还借款。对借款期限没有约定或者约定不明确，依据本法第五百一十条的规定仍不能确定的，借款人可以随时返还；贷款人可以催告借款人在合理期限内返还。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-676", "label": "民法典第676条：逾期利息", "type": "law", "color": "#3498db", "ref": "民法典第676条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人未按照约定的期限返还借款的，应当按照约定或者国家有关规定支付逾期利息。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-677", "label": "民法典第677条：提前返还借款", "type": "law", "color": "#3498db", "ref": "民法典第677条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人提前返还借款的，除当事人另有约定外，应当按照实际借款的期间计算利息。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-678", "label": "民法典第678条：借款展期", "type": "law", "color": "#3498db", "ref": "民法典第678条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "借款人可以在还款期限届满前向贷款人申请展期；贷款人同意的，可以展期。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-679", "label": "民法典第679条：自然人之间借款合同成立", "type": "law", "color": "#3498db", "ref": "民法典第679条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "自然人之间的借款合同，自贷款人提供借款时成立。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-680", "label": "民法典第680条：禁止高利贷", "type": "law", "color": "#3498db", "ref": "民法典第680条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "禁止高利放贷，借款的利率不得违反国家有关规定。借款合同对支付利息没有约定的，视为没有利息。借款合同对支付利息约定不明确，当事人不能达成补充协议的，按照当地或者当事人的交易方式、交易习惯、市场利率等因素确定利息；自然人之间借款的，视为没有利息。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-577", "label": "民法典第577条：违约责任", "type": "law", "color": "#3498db", "ref": "民法典第577条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-584", "label": "民法典第584条：可预见规则", "type": "law", "color": "#3498db", "ref": "民法典第584条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人一方不履行合同义务或者履行合同义务不符合约定，造成对方损失的，损失赔偿额应当相当于因违约所造成的损失，包括合同履行后可以获得的利益；但是，不得超过违约一方订立合同时预见到或者应当预见到的因违约可能造成的损失。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-585", "label": "民法典第585条：违约金", "type": "law", "color": "#3498db", "ref": "民法典第585条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人可以约定一方违约时应当根据违约情况向对方支付一定数额的违约金，也可以约定因违约产生的损失赔偿额的计算方法。约定的违约金低于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以增加；约定的违约金过分高于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以适当减少。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-586", "label": "民法典第586条：定金", "type": "law", "color": "#3498db", "ref": "民法典第586条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人可以约定一方向对方给付定金作为债权的担保。定金合同自实际交付定金时成立。定金的数额由当事人约定；但是，不得超过主合同标的额百分之二十，超过部分不产生定金的效力。实际交付的定金数额多于或者少于约定数额的，视为变更约定的定金数额。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-587", "label": "民法典第587条：定金罚则", "type": "law", "color": "#3498db", "ref": "民法典第587条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "债务人履行债务的，定金应当抵作价款或者收回。给付定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，无权请求返还定金；收受定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，应当双倍返还定金。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-563", "label": "民法典第563条：合同法定解除", "type": "law", "color": "#3498db", "ref": "民法典第563条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "有下列情形之一的，当事人可以解除合同：（一）因不可抗力致使不能实现合同目的；（二）在履行期限届满前，当事人一方明确表示或者以自己的行为表明不履行主要债务；（三）当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行；（四）当事人一方迟延履行债务或者有其他违约行为致使不能实现合同目的；（五）法律规定的其他情形。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1165", "label": "民法典第1165条：过错责任原则", "type": "law", "color": "#3498db", "ref": "民法典第1165条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "行为人因过错侵害他人民事权益造成损害的，应当承担侵权责任。依照法律规定推定行为人有过错，其不能证明自己没有过错的，应当承担侵权责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1179", "label": "民法典第1179条：人身损害赔偿", "type": "law", "color": "#3498db", "ref": "民法典第1179条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "侵害他人造成人身损害的，应当赔偿医疗费、护理费、交通费、营养费、住院伙食补助费等为治疗和康复支出的合理费用，以及因误工减少的收入。造成残疾的，还应当赔偿辅助器具费和残疾赔偿金；造成死亡的，还应当赔偿丧葬费和死亡赔偿金。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1182", "label": "民法典第1182条：财产损失赔偿", "type": "law", "color": "#3498db", "ref": "民法典第1182条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "侵害他人人身权益造成财产损失的，按照被侵权人因此受到的损失或者侵权人因此获得的利益赔偿；被侵权人因此受到的损失以及侵权人因此获得的利益难以确定，被侵权人和侵权人就赔偿数额协商不一致，向人民法院提起诉讼的，由人民法院根据实际情况确定赔偿数额。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1213", "label": "民法典第1213条：交通事故赔偿责任", "type": "law", "color": "#3498db", "ref": "民法典第1213条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "机动车发生交通事故造成损害，属于该机动车一方责任的，先由承保机动车强制保险的保险人在强制保险责任限额范围内予以赔偿；不足部分，由承保机动车商业保险的保险人按照保险合同的约定予以赔偿；仍然不足或者没有投保机动车商业保险的，由侵权人赔偿。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-496", "label": "民法典第496条：格式条款", "type": "law", "color": "#3498db", "ref": "民法典第496条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款。采用格式条款订立合同的，提供格式条款的一方应当遵循公平原则确定当事人之间的权利和义务，并采取合理的方式提示对方注意免除或者减轻其责任等与对方有重大利害关系的条款，按照对方的要求，对该条款予以说明。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-497", "label": "民法典第497条：格式条款无效情形", "type": "law", "color": "#3498db", "ref": "民法典第497条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "有下列情形之一的，该格式条款无效：（一）具有本法第一编第六章第三节和本法第五百零六条规定的无效情形；（二）提供格式条款一方不合理地免除或者减轻其责任、加重对方责任、限制对方主要权利；（三）提供格式条款一方排除对方主要权利。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-510", "label": "民法典第510条：合同约定不明时的补充", "type": "law", "color": "#3498db", "ref": "民法典第510条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "合同生效后，当事人就质量、价款或者报酬、履行地点等内容没有约定或者约定不明确的，可以协议补充；不能达成补充协议的，按照合同相关条款或者交易习惯确定。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-511", "label": "民法典第511条：合同内容确定规则", "type": "law", "color": "#3498db", "ref": "民法典第511条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人就有关合同内容约定不明确，依据前条规定仍不能确定的，适用下列规定：（一）质量要求不明确的，按照强制性国家标准履行；没有强制性国家标准的，按照推荐性国家标准履行；……（四）履行期限不明确的，债务人可以随时履行，债权人也可以随时请求履行，但是应当给对方必要的准备时间。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-509", "label": "民法典第509条：合同全面履行原则", "type": "law", "color": "#3498db", "ref": "民法典第509条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人应当按照约定全面履行自己的义务。当事人应当遵循诚信原则，根据合同的性质、目的和交易习惯履行通知、协助、保密等义务。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1076", "label": "民法典第1076条：协议离婚", "type": "law", "color": "#3498db", "ref": "民法典第1076条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "夫妻双方自愿离婚的，应当签订书面离婚协议，并亲自到婚姻登记机关申请离婚登记。离婚协议应当载明双方自愿离婚的意思表示和对子女抚养、财产以及债务处理等事项协商一致的意见。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1079", "label": "民法典第1079条：诉讼离婚", "type": "law", "color": "#3498db", "ref": "民法典第1079条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "夫妻一方要求离婚的，可以由有关组织进行调解或者直接向人民法院提起离婚诉讼。人民法院审理离婚案件，应当进行调解；如果感情确已破裂，调解无效的，应当准予离婚。有下列情形之一，调解无效的，应当准予离婚：（一）重婚或者与他人同居；（二）实施家庭暴力或者虐待、遗弃家庭成员；（三）有赌博、吸毒等恶习屡教不改；（四）因感情不和分居满二年。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1085", "label": "民法典第1085条：离婚后子女抚养费", "type": "law", "color": "#3498db", "ref": "民法典第1085条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "离婚后，子女由一方直接抚养的，另一方应当负担部分或者全部抚养费。负担费用的多少和期限的长短，由双方协议；协议不成的，由人民法院判决。前款规定的协议或者判决，不妨碍子女在必要时向父母任何一方提出超过协议或者判决原定数额的合理要求。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1087", "label": "民法典第1087条：离婚财产分割", "type": "law", "color": "#3498db", "ref": "民法典第1087条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "离婚时，夫妻的共同财产由双方协议处理；协议不成的，由人民法院根据财产的具体情况，按照照顾子女、女方和无过错方权益的原则判决。对夫或者妻在家庭土地承包经营中享有的权益等，应当依法予以保护。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1091", "label": "民法典第1091条：离婚损害赔偿", "type": "law", "color": "#3498db", "ref": "民法典第1091条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "有下列情形之一，导致离婚的，无过错方有权请求损害赔偿：（一）重婚；（二）与他人同居；（三）实施家庭暴力；（四）虐待、遗弃家庭成员；（五）有其他重大过错。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1122", "label": "民法典第1122条：遗产范围", "type": "law", "color": "#3498db", "ref": "民法典第1122条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "遗产是自然人死亡时遗留的个人合法财产。依照法律规定或者根据其性质不得继承的遗产，不得继承。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1123", "label": "民法典第1123条：继承方式", "type": "law", "color": "#3498db", "ref": "民法典第1123条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "继承开始后，按照法定继承办理；有遗嘱的，按照遗嘱继承或者遗赠办理；有遗赠扶养协议的，按照协议办理。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1127", "label": "民法典第1127条：法定继承顺序", "type": "law", "color": "#3498db", "ref": "民法典第1127条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "遗产按照下列顺序继承：（一）第一顺序：配偶、子女、父母；（二）第二顺序：兄弟姐妹、祖父母、外祖父母。继承开始后，由第一顺序继承人继承，第二顺序继承人不继承；没有第一顺序继承人继承的，由第二顺序继承人继承。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-1145", "label": "民法典第1145条：遗产管理人", "type": "law", "color": "#3498db", "ref": "民法典第1145条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "继承开始后，遗嘱执行人为遗产管理人；没有遗嘱执行人的，继承人应当及时推选遗产管理人；继承人未推选的，由继承人共同担任遗产管理人；没有继承人或者继承人均放弃继承的，由被继承人生前住所地的民政部门或者村民委员会担任遗产管理人。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-395", "label": "民法典第395条：抵押财产范围", "type": "law", "color": "#3498db", "ref": "民法典第395条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "债务人或者第三人有权处分的下列财产可以抵押：（一）建筑物和其他土地附着物；（二）建设用地使用权；（三）海域使用权；（四）生产设备、原材料、半成品、产品；（五）正在建造的建筑物、船舶、航空器；（六）交通运输工具；（七）法律、行政法规未禁止抵押的其他财产。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-425", "label": "民法典第425条：质权", "type": "law", "color": "#3498db", "ref": "民法典第425条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "为担保债务的履行，债务人或者第三人将其动产出质给债权人占有的，债务人不履行到期债务或者发生当事人约定的实现质权的情形，债权人有权就该动产优先受偿。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-681", "label": "民法典第681条：保证合同定义", "type": "law", "color": "#3498db", "ref": "民法典第681条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "保证合同是为保障债权的实现，保证人和债权人约定，当债务人不履行到期债务或者发生当事人约定的情形时，保证人履行债务或者承担责任的合同。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-686", "label": "民法典第686条：保证方式", "type": "law", "color": "#3498db", "ref": "民法典第686条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "保证的方式包括一般保证和连带责任保证。当事人在保证合同中对保证方式没有约定或者约定不明确的，按照一般保证承担保证责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-687", "label": "民法典第687条：一般保证先诉抗辩权", "type": "law", "color": "#3498db", "ref": "民法典第687条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "一般保证的保证人在主合同纠纷未经审判或者仲裁，并就债务人财产依法强制执行仍不能履行债务前，有权拒绝向债权人承担保证责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-688", "label": "民法典第688条：连带责任保证", "type": "law", "color": "#3498db", "ref": "民法典第688条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人在保证合同中约定保证人和债务人对债务承担连带责任的，为连带责任保证。连带责任保证的债务人不履行到期债务或者发生当事人约定的情形时，债权人可以请求债务人履行债务，也可以请求保证人在其保证范围内承担保证责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "law-civil-692", "label": "民法典第692条：保证期间", "type": "law", "color": "#3498db", "ref": "民法典第692条", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "保证期间是确定保证人承担保证责任的期间，不发生中止、中断和延长。债权人与保证人可以约定保证期间，但是约定的保证期间早于主债务履行期限或者与主债务履行期限同时届满的，视为没有约定；没有约定或者约定不明确的，保证期间为主债务履行期限届满之日起六个月。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-001", "label": "民间借贷", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "自然人、法人、非法人组织之间进行资金融通的行为。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-002", "label": "LPR（贷款市场报价利率）", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "由中国人民银行授权全国银行间同业拆借中心计算并公布的基础性贷款参考利率，是法院裁判民间借贷利率的主要参考标准。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-003", "label": "砍头息", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "指出借人在提供借款时，预先将利息从本金中扣除的行为。民法典第670条明确禁止砍头息，应以实际出借金额认定本金。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-004", "label": "诉讼时效", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "权利人在法定期限内不行使权利，义务人获得抗辩权的制度。一般诉讼时效为三年，自权利人知道或者应当知道权利受到损害以及义务人之日起计算。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-005", "label": "不可抗力", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "不能预见、不能避免且不能克服的客观情况，如自然灾害、战争、政府行为等。因不可抗力不能履行民事义务的，不承担民事责任。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-006", "label": "格式条款", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款。提供格式条款的一方应当遵循公平原则，并采取合理方式提示对方注意重要条款。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-007", "label": "保证期间", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "保证人承担保证责任的期间，不发生中止、中断和延长。没有约定或约定不明确的，保证期间为主债务履行期限届满之日起六个月。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-008", "label": "先诉抗辩权（先执行抗辩权）", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "一般保证的保证人在主合同未经审判或仲裁，并就债务人财产强制执行仍不能履行债务前，有权拒绝向债权人承担保证责任的权利。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-009", "label": "违约金过高调整", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "约定的违约金超过造成损失的30%的，一般可以认定为过分高于造成的损失，人民法院可以根据当事人的请求予以适当减少。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "term-010", "label": "经济补偿金", "type": "term", "color": "#27ae60", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "用人单位与劳动者解除或终止劳动合同时，依法向劳动者支付的经济补偿。按劳动者在本单位工作的年限，每满一年支付一个月工资。", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "template-contract-review", "label": "contract review", "type": "template", "color": "#9b59b6", "ref": "", "src": "seed", "usage": 0, "dbLabel": "公共", "content": "# 合同审查要点清单\n\n## 主体审查\n- [ ] 签约方是否具备主体资格\n- [ ] 是否完成必要的授权\n\n## 标的条款\n- [ ] 标的物/服务描述是否清晰\n- [ ] 数量、质量、规格是否明确\n\n## 价款条款\n- [ ] 金额、币种、支付方式是否明确\n- [ ] 发票类型及税率约定\n\n## 履约条款\n- [ ] 履行期限、地点、方式是否明确\n- [ ] 交付/验收标准\n\n## 违约责任\n- [ ] 违约金比例是否合法（不超过实际损失的30%）\n- [ ] 免责条款是否合理\n\n## 争议解决\n- [ ] 管辖法院/仲裁机构约定\n- [ ] 适用法律\n\n## 其他\n- [ ] 保密条款\n- [ ] 知识产权归属\n- [ ] 合同变更/解除条件\n- [ ] 通知送达条款\n", "sourceIcon": "📚", "sourceLabel": "公共知识库"}, {"id": "kb-cdf044d0", "label": "民间借贷利率上限——4倍LPR规则", "type": "law", "color": "#3498db", "ref": "《最高人民法院关于审理民间借贷案件适用法律若干问题的规定》第25、28、29条", "src": "manual", "usage": 0, "dbLabel": "个人", "content": "民间借贷利率最高保护上限为合同成立时一年期LPR的4倍。根据《最高人民法院关于审理民间借贷案件适用法律若干问题的规定》（2020年第二次修正）第25条、第28条、第29条。当前（2026年7月）一年期LPR为3.10%，4倍即12.4%/年。超出部分法院不予支持，已支付的超额利息可主张抵扣本金。逾期利率、违约金合计也不得超过一年期LPR的4倍。过渡期规则：2020年8月20日前成立的借款，该日之后的利息按起诉时一年期LPR的4倍计算。", "sourceIcon": "📝", "sourceLabel": "个人笔记"}];

  updateView();
}

function getFiltered() {
  var q = document.getElementById('search').value.toLowerCase();
  return NODES.filter(function(n) {
    return activeFilters[n.type] && (!q || n.label.toLowerCase().indexOf(q) >= 0 || (n.ref||'').toLowerCase().indexOf(q) >= 0 || (n.content||'').toLowerCase().indexOf(q) >= 0);
  });
}

function rG(items, edges) {
  var cy = document.getElementById('cy');
  var svg = document.querySelector('#cy svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.style.cssText = 'position:absolute;top:0;left:0';
    cy.appendChild(svg);
  }
  svg.innerHTML = '';
  var eg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(eg);
  var ng = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(ng);

  var ids = {};
  items.forEach(function(n) { ids[n.id] = true; });
  var fEdges = edges.filter(function(e) { return ids[e.src] && ids[e.tgt]; });

  var w = cy.clientWidth || 800;
  var h = cy.clientHeight || 500;
  var cx = w / 2;
  var cy_h = h / 2;

  var nodes = items.map(function(n) {
    return { id: n.id, label: n.label, type: n.type, color: n.color, ref: n.ref, usage: n.usage || 0,
             content: n.content || '', sourceIcon: n.sourceIcon || '📓', sourceLabel: n.sourceLabel || '',
             x: Math.random() * w, y: Math.random() * h, vx: 0, vy: 0 };
  });
  var nm = {};
  nodes.forEach(function(n) { nm[n.id] = n; });

  (function step() {
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      n.vx += (cx - n.x) * 0.001;
      n.vy += (cy_h - n.y) * 0.001;
      for (var j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        var o = nodes[j];
        var dx = n.x - o.x, dy = n.y - o.y;
        var dist = Math.sqrt(dx*dx + dy*dy) || 1;
        var f = 2000 / (dist * dist);
        n.vx += dx/dist * f;
        n.vy += dy/dist * f;
      }
    }
    for (var k = 0; k < fEdges.length; k++) {
      var e = fEdges[k];
      var s = nm[e.src], t = nm[e.tgt];
      if (!s || !t) continue;
      var dx = t.x - s.x, dy = t.y - s.y;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      var f2 = (dist - 120) * 0.005;
      var fx = dx/dist * f2, fy = dy/dist * f2;
      s.vx += fx; s.vy += fy;
      t.vx -= fx; t.vy -= fy;
    }
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      n.vx *= 0.85; n.vy *= 0.85;
      var sp = Math.sqrt(n.vx*n.vx + n.vy*n.vy);
      if (sp > 3) { n.vx *= 3/sp; n.vy *= 3/sp; }
      n.x += n.vx; n.y += n.vy;
      n.x = Math.max(20, Math.min(w-20, n.x));
      n.y = Math.max(20, Math.min(h-20, n.y));
    }
    var edgeHtml = '';
    for (var k = 0; k < fEdges.length; k++) {
      var e = fEdges[k];
      var s = nm[e.src], t = nm[e.tgt];
      if (!s || !t) continue;
      var st = e.style === 'solid' ? 'stroke:#e74c3c;stroke-width:1.5' : 'stroke:#bdc3c7;stroke-width:1;stroke-dasharray:4,3';
      edgeHtml += '<line x1="' + s.x + '" y1="' + s.y + '" x2="' + t.x + '" y2="' + t.y + '" style="' + st + ';opacity:.5"/>';
    }
    eg.innerHTML = edgeHtml;
    var nodeHtml = '';
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      var r = Math.min(8 + (n.usage||0) * 0.5, 20);
      nodeHtml += '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + r + '" fill="' + n.color + '" stroke="#fff" stroke-width="1.5" style="cursor:pointer" onclick="showDetail(\'' + n.id + '\')" onmouseover="showTooltip(\'' + (n.label||'').replace(/'/g, '') + '\',event)" onmouseout="hideTooltip()"/>';
    }
    ng.innerHTML = nodeHtml;
    var moving = false;
    for (var i = 0; i < nodes.length; i++) {
      if (Math.abs(nodes[i].vx) > 0.1 || Math.abs(nodes[i].vy) > 0.1) { moving = true; break; }
    }
    if (moving) { requestAnimationFrame(step); }
  })();
}

function updateView() {
  var f = getFiltered();
  rG(f, EDGES);
  document.getElementById('nc').textContent = '(显示 ' + f.length + ' 条)';
  document.getElementById('nl').innerHTML = f.map(function(n) {
    return '<div class="ni" onclick="showDetail(\'' + n.id + '\')"><span class="dot" style="background:' + n.color + '"></span><span class="nm">' + n.label + '</span><span class="nt">' + (LABELS[n.type]||n.type) + '</span></div>';
  }).join('');
}

function showDetail(id) {
  var n = nodeMap[id];
  if (!n) return;
  document.getElementById('dt').textContent = n.label;
  var d = document.getElementById('dty');
  d.textContent = LABELS[n.type] || n.type;
  d.style.background = COLORS[n.type] || '#95a5a6';
  document.getElementById('dsrc').innerHTML = (n.sourceIcon || '📓') + ' ' + (n.sourceLabel || '个人知识');
  document.getElementById('dusage').textContent = '使用 ' + (n.usage||0) + ' 次';
  document.getElementById('dc').textContent = n.content || '(无详细内容)';
  document.getElementById('dp').classList.add('sh');
}
function cD() { document.getElementById('dp').classList.remove('sh'); }
function showTooltip(t, e) {
  var tp = document.getElementById('tp');
  tp.textContent = t;
  tp.style.display = 'block';
  var r = document.querySelector('.ga').getBoundingClientRect();
  tp.style.left = (e.clientX - r.left + 10) + 'px';
  tp.style.top = (e.clientY - r.top - 20) + 'px';
}
function hideTooltip() { document.getElementById('tp').style.display = 'none'; }

document.getElementById('legend').innerHTML = Object.keys(COLORS).map(function(k) {
  return '<div><span class="ld" style="background:' + COLORS[k] + '"></span> ' + LABELS[k] + '</div>';
}).join('');

updateView();
</script>
</body>
</html>
